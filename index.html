<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Phan mem ke don thuoc ngoai tru</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <!-- ========== SIDEBAR ========== -->
        <div class="sidebar">

            <div class="sidebar-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1565c0" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                </svg>
                KÊ ĐƠN NGOẠI TRÚ
            </div>

            <div class="group">
                <label>Cơ sở khám</label>
                <input id="clinicName" value="PHONG KHAM DA KHOA">
            </div>

            <div class="group">
                <label>Đơn vị kê đơn</label>
                <input id="unitName" value="KHOA KHAM BENH">
            </div>

            <div class="group">
                <label>Bệnh nhân</label>
                <input id="patientName" placeholder="Ho va ten...">
            </div>

            <div class="row2">
                <div class="group">
                    <label>Tuổi</label>
                    <input id="patientAge" placeholder="Tuoi">
                </div>
                <div class="group">
                    <label>Giới tính</label>
                    <select id="patientGender">
                        <option>Nam</option>
                        <option>Nữ</option>
                    </select>
                </div>
            </div>
            <div class="group">
                <label>Địa chỉ</label>
                <input id="patientAddress" placeholder="Nhap dia chi benh nhan...">
            </div>

            <div class="group">
                <label>Chẩn đoán</label>
                <textarea id="diagnosis" placeholder="Nhap chan doan..."></textarea>
            </div>

            <div class="group">
                <label>Lời dặn</label>
                <textarea id="note" placeholder="Loi dan cho benh nhan..."></textarea>
            </div>

            <div class="row2">
                <div class="group">
                    <label>Bác sĩ kê đơn</label>
                    <input id="doctorName" placeholder="Ten bac si">
                </div>
                <div class="group">
                    <label>Ngày kê đơn</label>
                    <input type="date" id="prescriptionDate">
                </div>
            </div>

            <!-- DRUG EDITOR -->
            <div class="drug-editor">
                <h3>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1565c0" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" />
                        <path d="M12 8v8M8 12h8" />
                    </svg>
                    Thêm thuốc
                </h3>

                <div class="drug-row1">
                    <div class="drug-autocomplete">
                        <input id="drugNameInput" placeholder="Ten thuoc" autocomplete="off">
                        <div id="drugSuggestBox" class="drug-suggest-box"></div>
                    </div>

                    <input id="drugQtyInput" placeholder="So luong">
                    <button class="btn-primary" onclick="addDrug()">+</button>
                </div>

                                <div class="drug-row2">
                    <input id="drugGuideInput" placeholder="Cach dung thuoc (VD: Sang 1v, Chieu 1v)">
                </div>
            </div>
              <div class="toolbar">
                <button class="btn-primary" onclick="savePrescription()">Luu don</button>
                <button class="btn-warning" onclick="updatePrescription()">Cap nhat</button>
                <button class="btn-success" onclick="window.print()">In A5</button>
                <button class="btn-danger" onclick="newPrescription()">Don moi</button>
            </div>

        </div>

        <!-- ========== MAIN ========== -->
        <div class="main">

            <!-- PREVIEW -->
            <div class="preview">
                <div class="preview-label"></div>

                <div class="paper">
                    <div class="prescription">

                        <div class="header">
                            <div class="clinic">
                                <div class="clinic-name" id="printClinic"></div>
                                <div class="unit-name" id="printUnit"></div>
                            </div>
                        </div>

                        <div class="title">Đơn Thuốc Ngoại Trú</div>

                        <div class="patient">
                            <div class="patient-row">
                                <div class="patient-label">Họ tên:</div>
                                <div id="printPatient"></div>
                            </div>
                            <div class="patient-row">
                                <div class="patient-label">Tuổi:</div>
                                <div id="printAge"></div>
                                <div style="margin-left:14px;font-weight:bold;">Giới:</div>
                                <div id="printGender"></div>
                            </div>
                            <div class="patient-row">
                                <div class="patient-label">Địa chỉ:</div>
                                <div id="printAddress"></div>
                            </div>
                            <div class="patient-row">
                                <div class="patient-label">Chẩn đoán:</div>
                                <div id="printDiagnosis"></div>
                            </div>
                        </div>

                        <div class="rx"></div>

                        <table class="table-drug">
                            <tbody id="drugTableBody"></tbody>
                        </table>

                        <div class="note-box">
                            <div class="note-title">Lời dặn:</div>
                            <div id="printNote"></div>
                        </div>

                                                                        <div class="footer">
                            <div class="sign">
                                <div>Ngày <span id="day"></span> tháng <span id="month"></span> năm <span
                                        id="year"></span></div>
                                <div class="sign-title">BÁC SĨ KÊ ĐƠN</div>
                                <div class="doctor-name" id="printDoctor"></div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- HISTORY PANEL -->
            <div class="history-panel">

                <h3>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#1565c0" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    LỊCH SỬ ĐƠN THUỐC
                </h3>

                <input class="search-box" id="searchBox" placeholder="Tim kiem benh nhan, bac si..."
                    oninput="renderHistory()">

                <div id="historyList"></div>

            </div>

        </div>
    </div>

    <!-- LINK JAVASCRIPT -->
    <script src="script.js"></script>

</body>

</html>
